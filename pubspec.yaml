name: ekart
description: Ekart mobile app — Flutter frontend for the Ekart Spring Boot backend.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  geolocator: ^13.0.0
  shared_preferences: ^2.2.3
  webview_flutter: ^4.7.0       # Razorpay in-app WebView payment screen         # GST invoice PDF — open in browser
  image_picker: ^1.1.2 
  
  cupertino_icons: ^1.0.6
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
